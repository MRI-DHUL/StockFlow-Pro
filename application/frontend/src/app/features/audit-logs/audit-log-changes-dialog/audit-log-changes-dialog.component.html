<h2 mat-dialog-title>Audit Log Changes</h2>

<mat-dialog-content>
  <div class="changes-container">
    <div class="log-info">
      <div class="info-row">
        <span class="label">Entity:</span>
        <span class="value">{{log.entityName}}</span>
      </div>
      <div class="info-row">
        <span class="label">Action:</span>
        <span class="value action">{{log.action}}</span>
      </div>
      <div class="info-row">
        <span class="label">Performed By:</span>
        <span class="value">{{log.userName || 'System'}}</span>
      </div>
      <div class="info-row">
        <span class="label">Timestamp:</span>
        <span class="value">{{log.timestamp | date:'medium'}}</span>
      </div>
    </div>

    <div class="changes-section">
      <h3>Changes</h3>
      
      <div *ngIf="changes.length === 0" class="no-changes">
        No detailed changes available for this audit log.
      </div>

      <div *ngFor="let change of changes" class="change-item" 
           [class.highlighted]="hasChanged(change)">
        <div class="field-name">{{change.field}}</div>
        <div class="change-details">
          <div class="old-value">
            <span class="label">Before:</span>
            <span class="value">{{change.oldValue}}</span>
          </div>
          <div class="arrow">→</div>
          <div class="new-value">
            <span class="label">After:</span>
            <span class="value">{{change.newValue}}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button color="primary" (click)="onClose()">Close</button>
</mat-dialog-actions>
