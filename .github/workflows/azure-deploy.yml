name: Deploy StockFlow Pro Backend to Azure

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'application/backend/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: stockflowpro-api    # Set this to your Azure Web App name
  AZURE_WEBAPP_PACKAGE_PATH: './application/backend/src/StockFlow.API'
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./application/backend

      - name: Build solution
        run: dotnet build --configuration Release --no-restore
        working-directory: ./application/backend

      - name: Run tests (if available)
        run: dotnet test --configuration Release --no-build --verbosity normal
        working-directory: ./application/backend
        continue-on-error: true

      - name: Publish application
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/stockflowpro
        working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/stockflowpro

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Configure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              {
                "name": "ConnectionStrings__DefaultConnection",
                "value": "${{ secrets.SQL_CONNECTION_STRING }}",
                "slotSetting": false
              },
              {
                "name": "ConnectionStrings__Redis",
                "value": "${{ secrets.REDIS_CONNECTION_STRING }}",
                "slotSetting": false
              },
              {
                "name": "JwtSettings__SecretKey",
                "value": "${{ secrets.JWT_SECRET_KEY }}",
                "slotSetting": false
              },
              {
                "name": "GmailSettings__SenderEmail",
                "value": "${{ secrets.GMAIL_SENDER_EMAIL }}",
                "slotSetting": false
              },
              {
                "name": "GmailSettings__SenderPassword",
                "value": "${{ secrets.GMAIL_SENDER_PASSWORD }}",
                "slotSetting": false
              },
              {
                "name": "GmailSettings__AdminEmails__0",
                "value": "${{ secrets.GMAIL_ADMIN_EMAILS }}",
                "slotSetting": false
              },
              {
                "name": "PusherSettings__AppId",
                "value": "${{ secrets.PUSHER_APP_ID }}",
                "slotSetting": false
              },
              {
                "name": "PusherSettings__Key",
                "value": "${{ secrets.PUSHER_KEY }}",
                "slotSetting": false
              },
              {
                "name": "PusherSettings__Secret",
                "value": "${{ secrets.PUSHER_SECRET }}",
                "slotSetting": false
              }
            ]

      - name: Health Check
        run: |
          sleep 30
          curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1
