name: Deploy Frontend to InfinityFree

on:
  push:
    branches:
      - main
    paths:
      - 'application/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Angular App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/frontend/package-lock.json

      - name: Install dependencies
        working-directory: application/frontend
        run: npm ci

      - name: Build Angular app
        working-directory: application/frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./application/frontend/dist/stockflow-app/browser/
          server-dir: ./htdocs/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Deployment complete
        run: |
          echo "✅ Frontend deployed successfully to InfinityFree!"
          echo "🌐 Your app should be live at your InfinityFree domain"
