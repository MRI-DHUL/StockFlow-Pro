name: Deploy Frontend to InfinityFree

on:
  push:
    branches:
      - main
    paths:
      - 'application/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Angular App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/frontend/package-lock.json

      - name: Install dependencies
        working-directory: application/frontend
        run: npm ci

      - name: Build Angular app
        working-directory: application/frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check FTP secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ] || [ -z "${{ secrets.FTP_USERNAME }}" ] || [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "secrets_configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ FTP secrets not configured. Skipping deployment."
            echo ""
            echo "To enable automatic deployment to InfinityFree:"
            echo "1. Go to Settings → Secrets and variables → Actions"
            echo "2. Add the following secrets:"
            echo "   - FTP_SERVER (e.g., ftpupload.net)"
            echo "   - FTP_USERNAME (your InfinityFree FTP username)"
            echo "   - FTP_PASSWORD (your InfinityFree FTP password)"
          else
            echo "secrets_configured=true" >> $GITHUB_OUTPUT
            echo "✅ FTP secrets configured"
          fi

      - name: Deploy to InfinityFree via FTP
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./application/frontend/dist/stockflow-app/browser/
          server-dir: ./htdocs/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Deployment complete
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        run: |
          echo "✅ Frontend deployed successfully to InfinityFree!"
          echo "🌐 Your app should be live at your InfinityFree domain"
      
      - name: Build artifacts ready
        if: steps.check_secrets.outputs.secrets_configured == 'false'
        run: |
          echo "📦 Build completed successfully!"
          echo "⚠️ Deployment skipped - FTP secrets not configured"
          echo "The built files are ready in dist/ folder"
